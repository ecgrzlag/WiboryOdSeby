name: Aktualizuj dane WIBOR

on:
  schedule:
    # Codziennie o 18:00 UTC (19:00 lub 20:00 czasu polskiego)
    - cron: '0 18 * * 1-5'
  workflow_dispatch:  # Pozwala uruchomić ręcznie

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium
      
      - name: Download WIBOR data
        run: python download_wibor.py
      
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add wibor_all.csv last_update.txt
          git diff --staged --quiet || git commit -m "Aktualizacja danych WIBOR $(date +'%Y-%m-%d')"
          git push
